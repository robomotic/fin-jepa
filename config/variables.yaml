# ── Train / Val / Test splits ─────────────────────────────────────────────────
splits:
  train_start: "1993-01-04"
  train_end:   "2019-12-31"
  embargo_days: 20
  val_start:   "2020-02-03"
  val_end:     "2021-12-31"
  test_start:  "2022-01-24"
  test_end:    "2024-12-31"
  geopolitical_event_date: "2022-02-24"   # Russia-Ukraine invasion

# ── Normalization ─────────────────────────────────────────────────────────────
normalization:
  method: expanding_zscore
  min_burn_in_days: 252
  clip_sigma: 5.0
  missing_window_threshold: 0.20

# ── Model / Dataset ───────────────────────────────────────────────────────────
model:
  patch_len: 21           # 1 trading month per patch
  n_patches_context: 9   # 9 months visible to context encoder
  n_patches_target: 3    # predict next 3 months' latent patches
  mask_ratio: 0.70
  tau_start: 0.996        # EMA momentum (flat — annealing to 0.9999 caused overfitting with 770 windows)
  tau_end: 0.996          # EMA momentum target (same as start = flat schedule)
  d_model: 256
  n_heads: 8
  n_layers: 6
  d_ff: 1024
  dropout: 0.1

# ── CF-JEPA settings (used when --cf-jepa flag is passed to train.py) ─────────
cf_jepa:
  n_patches_short: 1        # short horizon: 1 patch  = 21 days (~1 month)
  n_patches_mid: 2          # mid   horizon: 2 patches = 42 days (~2 months)
  n_patches_long: 3         # long  horizon: 3 patches = 63 days (~3 months)
  crop_jitter_patches: 1    # context start jitter: up to 1 patch = 21 days
  w_short: 1.0              # loss weight for short-horizon VICReg term
  w_mid: 1.0                # loss weight for mid-horizon VICReg term
  w_long: 1.0               # loss weight for long-horizon VICReg term

# ── Experiment settings ───────────────────────────────────────────────────────
experiments:
  linear_probe:
    horizons_days: [1, 5, 20, 60]
    target_pairs:
      - [XLK, XLF]    # regime: rate sensitivity
      - [GLD, EEM]    # safe haven vs. EM
      - [SPY, HYG]    # risk-on breadth
  latent_arithmetic:
    gpr_shock_pct: 90    # GPR_DAILY > this percentile → shock
    gpr_calm_pct: 25     # GPR_DAILY < this → calm
    perturbation_days: 5
    perturbation_pct: 10
  geopolitical_transfer:
    event_date: "2022-02-24"
    baseline_window_days: 21
