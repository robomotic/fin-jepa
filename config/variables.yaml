# Canonical series registry.
# Every module reads from this file — do not hardcode tickers elsewhere.
#
# transform options: level | diff | log_return
# role options:      input | target | both
# source options:    fred | yahoo | gpr | epu | gscpi | nasdaqdl | boe

series:

  # ── Pillar 1: Cost of Capital ─────────────────────────────────────────────
  US10Y:
    source: fred
    id: DGS10
    frequency: daily
    transform: level
    pillar: 1
    role: input

  US02Y:
    source: fred
    id: DGS2
    frequency: daily
    transform: level
    pillar: 1
    role: input

  TIPS5Y:
    source: fred
    id: T5YIE
    frequency: daily
    transform: level
    pillar: 1
    role: input

  TIPS5Y5Y:
    source: fred
    id: T5YIFR
    frequency: daily
    transform: level
    pillar: 1
    role: input

  MOVE:
    source: fred
    id: MOVE
    frequency: daily
    transform: level
    pillar: 1
    role: input

  FEDFUNDS:
    source: fred
    id: DFF               # Daily Effective Federal Funds Rate (actual daily series; FEDFUNDS is monthly)
    frequency: daily
    pub_lag_days: 1
    transform: diff
    pillar: 1
    role: input

  XLK:
    source: yahoo
    id: XLK
    frequency: daily
    transform: log_return
    pillar: 1
    role: target

  XLF:
    source: yahoo
