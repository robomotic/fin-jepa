    source: yahoo
    id: DX-Y.NYB
    frequency: daily
    transform: log_return
    pillar: 2
    role: input

  VIX:
    source: yahoo
    id: ^VIX
    frequency: daily
    transform: level
    pillar: 2
    role: input

  EEM:
    source: yahoo
    id: EEM
    frequency: daily
    transform: log_return
    pillar: 2
    role: both

  GLD:
    source: boe
    id: XUDLGPD           # BoE daily gold fix USD/troy oz (1979-01-02 → 2017-05-26), auto-spliced with Yahoo GC=F post-2017
    frequency: daily
