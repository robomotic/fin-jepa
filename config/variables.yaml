    transform: log_return
    pillar: 1
    role: target

  TLT:
    source: yahoo
    id: TLT
    frequency: daily
    transform: log_return
    pillar: 1
    role: both

  # ── Pillar 2: Global Liquidity & Safe Haven ───────────────────────────────
